# Configurações Gerais e Banco de Dados (Dev/Prod)
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/simulador;AUTO_SERVER=TRUE
quarkus.datasource.username=sa
quarkus.datasource.password=sa

# Hibernate ORM - Delega DDL ao Flyway
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true

# Flyway - Automação de Migrations
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# Observabilidade & Logs
quarkus.log.console.format=%d{HH:mm:ss,SSS} %-5p traceId=%X{traceId}, spanId=%X{spanId} [%c{2.}] (%t) %s%e%n
quarkus.opentelemetry.enabled=true
quarkus.micrometer.export.prometheus.enabled=true

# Configuração Isolada de Testes
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:simulador_test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.log.sql=false
